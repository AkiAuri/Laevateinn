<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessibility Report</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #f4f4f9; background: #1e1e24; margin: 0; padding: 20px; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 30px auto; padding-bottom: 20px; border-bottom: 2px solid #444; }
        .header-bar h1 { margin: 0; font-size: 28px; }
        #downloadBtn { background-color: #1890ff; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        #downloadBtn:hover { background-color: #096dd9; }

        /* Report Container (Width adjusted so PDF doesn't cut off) */
        #pdf-content { max-width: 900px; margin: 0 auto; background: #1e1e24; }

        .meta-info { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 14px; }
        .score-box { text-align: center; font-size: 24px; font-weight: bold; padding: 15px; border-radius: 8px; margin: 20px 0; }

        .dashboard { display: flex; justify-content: space-between; margin-bottom: 30px; background: #2b2b36; padding: 20px; border-radius: 8px; border: 1px solid #444; }
        .chart-container { text-align: center; width: 45%; }
        .legend { margin-top: 15px; }
        .legend span { display: inline-block; padding: 4px 8px; color: white; border-radius: 3px; font-size: 12px; margin: 2px; text-transform: uppercase; font-weight: bold;}

        .category-stats { width: 50%; font-size: 14px; }
        .cat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0; }
        .cat-row:last-child { border: none; }

        .category-header { font-size: 20px; font-weight: bold; margin-top: 30px; padding: 8px 12px; color: white; border-radius: 4px; text-transform: capitalize; }
        .critical { background-color: #ff4d4f; } .serious { background-color: #faad14; } .moderate { background-color: #fadb14; color: #333; } .minor { background-color: #1890ff; }

        .issue-block { border-left: 4px solid #555; padding-left: 15px; margin-bottom: 30px; page-break-inside: avoid; }
        .issue-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .issue-desc { font-style: italic; margin-bottom: 10px; color: #bbb; background: #2b2b36; padding: 12px; border-radius: 4px; }

        .node-box { background: #2b2b36; border: 1px solid #444; padding: 12px; border-radius: 4px; margin-top: 10px; font-family: monospace; font-size: 12px; }
        .node-box strong { font-family: Arial, sans-serif; color: #fff; }
        pre { background: #111; color: #f8f8f2; padding: 12px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; margin-top: 5px; }
        a { color: #1890ff; text-decoration: none; font-weight: bold; }

        /* Print Specific Styling */
        .pdf-mode { background: #fff !important; color: #333 !important; padding: 20px !important; width: 100% !important; box-sizing: border-box;}
        .pdf-mode #pdf-content { max-width: 100% !important; background: #fff !important; }
        .pdf-mode .header-bar { display: none !important; }
        .pdf-mode .issue-title, .pdf-mode .node-box strong { color: #333 !important; }
        .pdf-mode .dashboard, .pdf-mode .issue-desc, .pdf-mode .node-box { background: #f9f9f9 !important; border-color: #ddd !important; }
        .pdf-mode .cat-row { border-color: #ddd !important; }
        .pdf-mode .meta-info, .pdf-mode .issue-desc { color: #555 !important; }
        .pdf-mode pre { background: #272822 !important; }
    </style>
</head>
<body>

<div class="header-bar">
    <h1>Accessibility Audit Report</h1>
    <button id="downloadBtn">⬇ Download as PDF</button>
</div>

<div id="pdf-content"></div>

<script src="html2pdf.bundle.min.js"></script>
<script src="translation.js"></script>
<script src="report.js"></script>
</body>
</html>
